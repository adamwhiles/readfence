# Flatpak manifest for Readfence.
#
# For a Flathub submission, this file and cargo-sources.json go at the TOP
# LEVEL of your fork of github.com/flathub/flathub (see flatpak/README.md).
#
# Build/test locally with:
#   flatpak install flathub org.flatpak.Builder
#   flatpak run org.flatpak.Builder --force-clean --install --user build-dir \
#       flatpak/com.readfence.Readfence.yaml
id: com.readfence.Readfence

# Freedesktop base runtime — no GTK needed: rfd 0.17 uses the XDG desktop
# portal for file dialogs, and iced renders via wgpu (Vulkan/Mesa in the runtime).
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: readfence

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Read-only host access so the viewer can open, drag-and-drop, and
  # live-reload Markdown files from anywhere. Readfence never writes files.
  - --filesystem=host:ro

modules:
  - name: readfence
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/readfence/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/readfence /app/bin/readfence
      - install -Dm644 assets/icon.png
        /app/share/icons/hicolor/512x512/apps/com.readfence.Readfence.png
      - install -Dm644 flatpak/com.readfence.Readfence.desktop
        /app/share/applications/com.readfence.Readfence.desktop
      - install -Dm644 flatpak/com.readfence.Readfence.metainfo.xml
        /app/share/metainfo/com.readfence.Readfence.metainfo.xml
      - install -Dm644 LICENSE /app/share/licenses/com.readfence.Readfence/LICENSE
    sources:
      - type: git
        url: https://github.com/adamwhiles/readfence.git
        tag: '0.3.4'
        # Replace with the exact commit SHA that tag 0.3.4 points to.
        # After tagging, run:  git rev-parse 0.3.4
        commit: REPLACE_WITH_COMMIT_SHA_OF_TAG_0.3.4
      - cargo-sources.json

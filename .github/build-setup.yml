- name: Install Linux aarch64 system dependencies
  if: runner.os == 'Linux' && contains(join(matrix.targets, ','), 'aarch64')
  shell: bash
  run: |
    sudo dpkg --add-architecture arm64
    sudo sed -i '/ports.ubuntu.com/d' /etc/apt/sources.list
    sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
    printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse\n' | sudo tee /etc/apt/sources.list.d/arm64-ports.list
    printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse\n' | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
    printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse\n' | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
    sudo apt-get update -qq
    sudo apt-get install -y \
      gcc-aarch64-linux-gnu \
      libwayland-dev:arm64 \
      libxkbcommon-dev:arm64 \
      libegl-dev:arm64 \
      libxrandr-dev:arm64 \
      libxi-dev:arm64

- name: Install WiX Toolset
  if: runner.os == 'Windows'
  shell: pwsh
  run: |
    $found = $null
    try { $found = (Get-Command candle.exe -ErrorAction Stop).Source } catch {}

    if (-not $found) {
      $knownBins = [System.Collections.Generic.List[string]]@(
        "C:\Program Files (x86)\WiX Toolset v3.14\bin",
        "C:\Program Files (x86)\WiX Toolset v3.11\bin",
        "C:\Program Files\WiX Toolset v3.14\bin",
        "$env:ChocolateyInstall\bin"
      )
      foreach ($root in @("${env:ProgramFiles(x86)}", "$env:ProgramFiles")) {
        if ($root -and (Test-Path $root)) {
          Get-ChildItem -Path $root -Directory -Filter 'WiX*' -ErrorAction SilentlyContinue |
            ForEach-Object { $knownBins.Add((Join-Path $_.FullName 'bin')) }
        }
      }
      $wixBinDir = $knownBins | Where-Object { Test-Path (Join-Path $_ 'candle.exe') } | Select-Object -First 1
      if ($wixBinDir) { $found = Join-Path $wixBinDir 'candle.exe' }
    }

    if (-not $found) {
      Write-Host "candle.exe not found, downloading WiX 3.14..."
      $installer = "$env:TEMP\wix314.exe"
      Invoke-WebRequest "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314.exe" -OutFile $installer -UseBasicParsing
      Start-Process -FilePath $installer -Args "/quiet /norestart" -Wait
      $found = "C:\Program Files (x86)\WiX Toolset v3.14\bin\candle.exe"
    }

    if (-not (Test-Path $found)) {
      throw "WiX installation failed - candle.exe not found at: $found"
    }

    $wixBin = Split-Path $found -Parent
    $wixRoot = Split-Path $wixBin -Parent
    "WIX=$wixRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    Write-Host "WiX ready at: $wixBin"
